services:
  claude:
    build: .
    image: claude-code
    container_name: claude-dev

    stdin_open: true
    tty: true

    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      REPO_URL: ${REPO_URL}
      SSH_AUTH_SOCK: /ssh-agent

    volumes:
      - ./workspace:/workspace
      - ${SSH_AUTH_SOCK}:/ssh-agent

    working_dir: /workspace
